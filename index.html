<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>処方計算 & Slack送信</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root{
    --bg:#0f1220; --card:#1a1f33; --card2:#232a45; --line:#2d3556;
    --accent:#5b7cfa; --accent2:#22c55e; --danger:#ef4444; --slack:#611f69;
    --text:#e8ecf8; --muted:#93a0c8; --chip:#2b3355;
  }
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;}
  body{padding:0 0 120px;font-size:16px;}
  .wrap{max-width:820px;margin:0 auto;padding:12px;}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#141830,#0f1220);
    border-bottom:1px solid var(--line);padding:10px 12px;display:flex;align-items:center;gap:10px;}
  header .t{font-size:17px;font-weight:800;flex:1;}
  header .gear{background:var(--card2);border:1px solid var(--line);color:var(--text);
    border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;}

  .patient{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;}
  .patient .fld{flex:1;min-width:120px;}
  label.lab{display:block;font-size:12px;color:var(--muted);margin:0 0 4px 2px;font-weight:700;}
  input,select,textarea{font-size:16px;color:var(--text);background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:11px 12px;width:100%;outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}

  .drug{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px;margin:12px 0;}
  .drug .row1{display:flex;gap:8px;align-items:flex-end;}
  .drug .row1 .name{flex:1;}
  .drug .del{background:transparent;border:none;color:var(--danger);font-size:22px;
    padding:6px 4px;line-height:1;}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
  @media(max-width:520px){.grid{grid-template-columns:1fr;}}

  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .chip{background:var(--chip);border:1px solid var(--line);color:var(--text);
    border-radius:999px;padding:6px 12px;font-size:15px;font-weight:700;}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .freq .chip{min-width:52px;text-align:center;}

  .calcline{margin-top:12px;background:var(--card2);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;font-size:16px;display:flex;align-items:center;gap:10px;}
  .calcline .big{font-weight:800;color:#fff;}
  .calcline .out{flex:1;font-family:"SF Mono",ui-monospace,monospace;color:#cfe0ff;
    word-break:break-all;}
  .calcline .warn{color:#fbbf24;font-size:13px;}
  .minibtn{background:var(--card);border:1px solid var(--line);color:var(--muted);
    border-radius:8px;padding:6px 10px;font-size:13px;font-weight:700;}

  .dosehelp{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;display:none;}
  .dosehelp.open{display:block;}
  .dosehelp .g{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;}
  @media(max-width:520px){.dosehelp .g{grid-template-columns:1fr 1fr;}}
  .dosehelp .res{margin-top:8px;font-size:14px;color:#cfe0ff;}

  .addbtn{width:100%;background:var(--card2);border:1px dashed var(--line);color:var(--text);
    border-radius:12px;padding:14px;font-size:16px;font-weight:800;margin:4px 0 16px;}

  .outputbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin:12px 0;}
  .outputbox .lab2{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:8px;}
  #preview{white-space:pre-wrap;font-family:"SF Mono",ui-monospace,monospace;font-size:15px;
    line-height:1.7;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    padding:12px;min-height:52px;color:#dbe6ff;}

  .actions{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(15,18,32,.96);
    border-top:1px solid var(--line);padding:10px 12px;display:flex;gap:8px;
    max-width:820px;margin:0 auto;backdrop-filter:blur(8px);}
  .actions .b{flex:1;border:none;border-radius:12px;padding:15px 10px;font-size:16px;font-weight:800;color:#fff;}
  .b.copy{background:var(--accent);} .b.slack{background:var(--slack);} .b.clear{background:#39406a;flex:0 0 92px;}

  .settings{position:fixed;inset:0;background:rgba(6,8,16,.7);z-index:50;display:none;
    align-items:flex-start;justify-content:center;padding:16px;overflow:auto;}
  .settings.open{display:flex;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;
    width:100%;max-width:560px;padding:16px;margin-top:20px;}
  .panel h3{margin:2px 0 12px;font-size:16px;}
  .panel .sec{margin:16px 0;padding-top:14px;border-top:1px solid var(--line);}
  .preset{display:flex;gap:8px;align-items:center;margin:6px 0;}
  .preset .pn{flex:1;} .preset .ps{width:110px;} .preset .pd{background:transparent;border:none;color:var(--danger);font-size:20px;}
  .hint{font-size:13px;color:var(--muted);line-height:1.6;}
  .okbtn{background:var(--accent2);color:#fff;border:none;border-radius:10px;padding:12px 16px;font-size:16px;font-weight:800;width:100%;margin-top:10px;}
  .smallbtn{background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px 12px;font-weight:700;}

  .recall-btn{width:100%;background:#1c3326;border:1px solid #2f7d54;color:#8ff0b4;
    border-radius:12px;padding:12px;font-size:15px;font-weight:800;}
  .recall-btn:active{background:#244433;}
  .hist{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:11px;margin:8px 0;}
  .hist-head{font-size:13px;color:var(--muted);font-weight:700;display:flex;justify-content:space-between;gap:8px;margin-bottom:6px;}
  .hist-time{color:#6b7699;font-weight:600;white-space:nowrap;}
  .hist-lines{font-family:"SF Mono",ui-monospace,monospace;font-size:14px;color:#dbe6ff;
    line-height:1.7;margin-bottom:9px;word-break:break-all;}

  #toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(12px);
    background:#0b1a12;border:1px solid var(--accent2);color:#d9ffe9;padding:11px 18px;border-radius:999px;
    font-size:15px;font-weight:700;opacity:0;transition:.2s;pointer-events:none;z-index:60;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <span class="t">💊 処方計算</span>
  <button class="gear" onclick="openSettings()">⚙︎ 設定</button>
</header>

<div class="wrap">

  <div class="patient">
    <div class="fld" style="flex:0 0 150px;">
      <label class="lab">カルテ番号</label>
      <input id="karte" inputmode="text" placeholder="例 123-1" oninput="onKarteInput()">
    </div>
    <div class="fld">
      <label class="lab">患者名（任意）</label>
      <input id="pname" placeholder="例 ポチ" oninput="persist()">
    </div>
    <div class="fld" style="flex:0 0 140px;">
      <label class="lab">日付</label>
      <input id="pdate" type="date" oninput="persist()">
    </div>
  </div>

  <div id="recallBar" style="display:none;margin:0 0 12px;">
    <button class="recall-btn" onclick="openRecall()">🔁 このカルテの前回処方 <span id="recallCount"></span></button>
  </div>

  <div id="drugs"></div>

  <button class="addbtn" onclick="addDrug()">＋ 薬剤を追加</button>

  <div class="outputbox">
    <div class="lab2">OneNote貼り付け用（コピーされる内容）</div>
    <div id="preview">—</div>
  </div>

</div>

<div class="actions">
  <button class="b copy"  onclick="copyOut()">📋 コピー</button>
  <button class="b slack" onclick="sendSlack()">Slackへ送信</button>
  <button class="b clear" onclick="clearAll()">クリア</button>
</div>

<!-- 設定パネル -->
<div class="settings" id="settings">
  <div class="panel">
    <h3>⚙︎ 設定</h3>

    <div>
      <label class="lab">Slack Incoming Webhook URL</label>
      <input id="webhook" placeholder="https://hooks.slack.com/services/..." >
      <p class="hint">処方専用チャンネル（例 #処方）のWebhookを推奨。ここに貼るとこのiPadだけに保存されます。</p>
    </div>

    <div class="sec">
      <label class="lab">薬剤プリセット（名前 ／ 1錠の規格mg・任意）</label>
      <div id="presetList"></div>
      <button class="smallbtn" onclick="addPreset()">＋ 薬剤を登録</button>
      <p class="hint">よく出す薬を登録すると、薬剤名の入力候補に出ます。規格mgは「用量から計算」で使います。</p>
    </div>

    <div class="sec">
      <p class="hint"><b>出力の形式</b>：<br>
      <code>1/4T TID イーケプラ 15T/20days</code><br>
      ＝ 1回量T ／ 頻度 ／ 薬剤名 ／ 合計T ／ 日数。<br>
      1回量は 1/4・0.25・1 1/2 などの入力に対応します。</p>
    </div>

    <button class="okbtn" onclick="saveSettings()">保存して閉じる</button>
  </div>
</div>

<!-- 前回処方の呼び出しパネル -->
<div class="settings" id="recall">
  <div class="panel">
    <h3>🔁 前回処方の呼び出し</h3>
    <div id="recallList"></div>
    <button class="okbtn" style="background:#39406a" onclick="closeRecall()">閉じる</button>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// 分数演算（0.1+0.2 のような浮動小数点誤差を避けるため厳密分数で計算）
// ─────────────────────────────────────────────────────────────
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a||1; }
class Frac{
  constructor(n,d=1){ if(d<0){n=-n;d=-d;} const g=gcd(n,d); this.n=Math.round(n/g); this.d=Math.round(d/g); }
  mulInt(k){ return new Frac(this.n*k, this.d); }
  toNumber(){ return this.n/this.d; }
  // 単純分数表記（1/4 など）。整数ならそのまま
  simple(){ return this.d===1 ? String(this.n) : this.n+'/'+this.d; }
  // 帯分数（2 1/2 など）
  mixed(){
    if(this.d===1) return String(this.n);
    const w=Math.trunc(this.n/this.d), r=Math.abs(this.n%this.d);
    return w!==0 ? `${w} ${r}/${this.d}` : `${this.n}/${this.d}`;
  }
}
/** "1/4" "0.25" "1 1/2" "1.5" "2" → Frac（不正なら null） */
function parseAmount(s){
  if(s==null) return null;
  s=String(s).trim(); if(!s) return null;
  s=s.replace('／','/').replace(/\s+/g,' ');
  // 帯分数 "w n/d"
  let m=s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if(m){ const w=+m[1],n=+m[2],d=+m[3]; if(!d) return null; return new Frac(w*d+n, d); }
  // 分数 "n/d"
  m=s.match(/^(\d+)\/(\d+)$/);
  if(m){ const n=+m[1],d=+m[2]; if(!d) return null; return new Frac(n,d); }
  // 小数 or 整数
  if(/^\d*\.?\d+$/.test(s)){
    if(s.includes('.')){ const dec=s.split('.')[1].length; const den=Math.pow(10,dec); return new Frac(Math.round(parseFloat(s)*den), den); }
    return new Frac(parseInt(s,10),1);
  }
  return null;
}
/** 表示用に数値を整形（整数はそのまま／小数は末尾0を落として最大3桁） */
function fmtNum(x){
  if(Number.isInteger(x)) return String(x);
  return parseFloat(x.toFixed(3)).toString();
}
/** 1回量の表記：整数はそのまま／1未満は分数(1/4)／1以上の端数は小数(1.5) */
function doseLabel(f){
  if(f.d===1) return String(f.n);
  if(f.n < f.d) return f.n+'/'+f.d;   // 1未満 → 1/4, 1/8 …（先生の記法）
  return fmtNum(f.toNumber());          // 1以上の端数 → 1.5, 1.25 …
}

// ─────────────────────────────────────────────────────────────
// 状態
// ─────────────────────────────────────────────────────────────
const FREQS = [
  {key:'SID', n:1, jp:'1日1回'},
  {key:'BID', n:2, jp:'1日2回'},
  {key:'TID', n:3, jp:'1日3回'},
  {key:'QID', n:4, jp:'1日4回'},
];
// Slack送信先(Webhook)は公開リポジトリに置かない（Slackが自動失効させるため）。
// 各iPadの「⚙︎設定」に貼り付け、その端末のlocalStorageにのみ保存する。
const DEFAULT_WEBHOOK = '';

let rows = [];        // {id, name, dose, freq(n), freqKey, days, doseOpen, w, mgkg}
let presets = [];     // {name, mg}
let settings = { webhook: DEFAULT_WEBHOOK };
let _seq = 1;
const uid = ()=> 'r'+(_seq++);

// ─────────────────────────────────────────────────────────────
// 永続化（このiPad/ブラウザのlocalStorageのみ・外部送信なし）
// ─────────────────────────────────────────────────────────────
function persist(){
  syncFromDom();
  localStorage.setItem('rx_state', JSON.stringify({
    karte:val('karte'), pname:val('pname'), pdate:val('pdate'), rows
  }));
}
function persistPresets(){ localStorage.setItem('rx_presets', JSON.stringify(presets)); }
function persistSettings(){ localStorage.setItem('rx_settings', JSON.stringify(settings)); }

// ── 処方履歴（カルテ番号ごと・この端末のlocalStorageのみ）─────────────────────
function historyGet(){ try{ return JSON.parse(localStorage.getItem('rx_history')||'{}'); }catch(_){ return {}; } }
function historySet(h){ localStorage.setItem('rx_history', JSON.stringify(h)); }
/** コピー/送信した処方を、カルテ番号ごとに記録（直近と同一内容は重複保存しない・各カルテ最大10件） */
function saveHistory(){
  const key=val('karte'); if(!key) return;
  const lines=drugLines(); if(!lines.length) return;
  const hist=historyGet();
  const list=hist[key]||[];
  const sig=lines.join('|');
  if(list[0] && (list[0].lines||[]).join('|')===sig) return;  // 直近と同じ→保存しない
  list.unshift({
    savedAt:new Date().toISOString(), pname:val('pname'), date:val('pdate'),
    rows: rows.map(r=>({name:r.name,dose:r.dose,freq:r.freq,freqKey:r.freqKey,days:r.days})),
    lines
  });
  hist[key]=list.slice(0,10);
  historySet(hist);
  updateRecallBtn();
}
function onKarteInput(){ persist(); updateRecallBtn(); }
function updateRecallBtn(){
  const key=val('karte');
  const list = key ? (historyGet()[key]||[]) : [];
  const bar=$('recallBar');
  if(list.length){ bar.style.display=''; $('recallCount').textContent='（'+list.length+'件）'; }
  else bar.style.display='none';
}
function openRecall(){
  const key=val('karte'); const list = key ? (historyGet()[key]||[]) : [];
  const box=$('recallList');
  if(!list.length){
    box.innerHTML='<p class="hint">このカルテ番号の履歴はまだありません。<br>カルテ番号を入れて「コピー」か「Slックへ送信」をすると記録されます。</p>';
  } else {
    box.innerHTML = list.map((e,i)=>`
      <div class="hist">
        <div class="hist-head">
          <span>${esc(e.date||'')}${e.pname?(' ・ '+esc(e.pname)):''}</span>
          <span class="hist-time">${new Date(e.savedAt).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
        </div>
        <div class="hist-lines">${(e.lines||[]).map(esc).join('<br>')}</div>
        <button class="smallbtn" onclick="loadHistoryEntry(${i})">この処方を読み込む</button>
      </div>`).join('');
  }
  $('recall').classList.add('open');
}
function closeRecall(){ $('recall').classList.remove('open'); }
function loadHistoryEntry(i){
  const key=val('karte'); const e=(historyGet()[key]||[])[i];
  if(!e) return;
  const hasData = rows.some(r=>r.name||r.dose||r.days);
  if(hasData && !confirm('今の入力を、選んだ前回処方で置き換えますか？')) return;
  if(e.pname!=null) setVal('pname', e.pname);   // 日付は今日のまま（今日出し直す用途のため上書きしない）
  rows = (e.rows||[]).map(r=>({ id:uid(), name:r.name||'', dose:r.dose||'', freq:r.freq||3,
    freqKey:r.freqKey||'TID', days:r.days||'', doseOpen:false, w:'', mgkg:'' }));
  if(!rows.length) rows=[blankRow()];
  render(); persist(); closeRecall();
  toast('前回処方を読み込みました');
}
function loadAll(){
  try{ presets = JSON.parse(localStorage.getItem('rx_presets')||'[]'); }catch(_){ presets=[]; }
  try{ const s=JSON.parse(localStorage.getItem('rx_settings')||'{}');
       settings = { webhook: (s.webhook && s.webhook.trim()) ? s.webhook : DEFAULT_WEBHOOK }; }
  catch(_){ settings = { webhook: DEFAULT_WEBHOOK }; }
  let st={};
  try{ st = JSON.parse(localStorage.getItem('rx_state')||'{}'); }catch(_){ st={}; }
  setVal('karte', st.karte||'');
  setVal('pname', st.pname||'');
  setVal('pdate', st.pdate|| new Date().toISOString().slice(0,10));
  rows = Array.isArray(st.rows) && st.rows.length ? st.rows : [ blankRow() ];
  rows.forEach(r=>{ if(!r.id) r.id=uid(); });
}
function blankRow(){ return { id:uid(), name:'', dose:'', freq:3, freqKey:'TID', days:'', doseOpen:false, w:'', mgkg:'' }; }

// ─────────────────────────────────────────────────────────────
// DOMヘルパー
// ─────────────────────────────────────────────────────────────
const $ = id=>document.getElementById(id);
const val = id=> ($(id)?.value ?? '').trim();
const setVal = (id,v)=>{ const e=$(id); if(e) e.value=v; };
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ─────────────────────────────────────────────────────────────
// 計算：1回量(Frac) × 頻度 × 日数 = 合計錠数(Frac)
// ─────────────────────────────────────────────────────────────
function calcRow(r){
  const dose = parseAmount(r.dose);
  const days = parseInt(r.days,10);
  if(!dose || !r.freq || !days || days<=0) return null;
  const total = dose.mulInt(r.freq).mulInt(days);
  return { dose, days, total };
}
/** 1薬剤の出力行： "1/4T TID イーケプラ 15T/20days" */
function lineFor(r){
  const c = calcRow(r);
  if(!c) return null;
  const name = r.name.trim() || '（薬剤名）';
  return `${doseLabel(c.dose)}T ${r.freqKey} ${name} ${fmtNum(c.total.toNumber())}T/${c.days}days`;
}

// ─────────────────────────────────────────────────────────────
// 描画
// ─────────────────────────────────────────────────────────────
function render(){
  const box = $('drugs');
  box.innerHTML='';
  rows.forEach(r=> box.appendChild(drugEl(r)) );
  renderPreview();
}

function drugEl(r){
  const el = document.createElement('div');
  el.className='drug'; el.dataset.id=r.id;
  const opts = presets.map(p=>`<option value="${esc(p.name)}">`).join('');
  el.innerHTML = `
    <div class="row1">
      <div class="name">
        <label class="lab">薬剤名</label>
        <input class="f-name" list="preset-dl" value="${esc(r.name)}" placeholder="例 イーケプラ">
      </div>
      <button class="del" title="削除">✕</button>
    </div>

    <div class="grid">
      <div>
        <label class="lab">1回量（錠）</label>
        <input class="f-dose" inputmode="decimal" value="${esc(r.dose)}" placeholder="例 1/4">
        <div class="chips f-dosechips">
          ${['1/8','1/4','1/3','1/2','3/4','1','1.5','2'].map(v=>`<button class="chip" data-v="${v}">${v}</button>`).join('')}
        </div>
      </div>
      <div>
        <label class="lab">頻度</label>
        <div class="chips freq f-freq">
          ${FREQS.map(f=>`<button class="chip ${r.freqKey===f.key?'on':''}" data-k="${f.key}" data-n="${f.n}">${f.key}<br><span style="font-size:11px;font-weight:600;opacity:.8">${f.jp}</span></button>`).join('')}
        </div>
      </div>
      <div>
        <label class="lab">日数</label>
        <input class="f-days" inputmode="numeric" value="${esc(r.days)}" placeholder="例 20">
        <div class="chips">
          ${['5','7','10','14','20','30'].map(v=>`<button class="chip f-daychip" data-v="${v}">${v}</button>`).join('')}
        </div>
      </div>
    </div>

    <div class="calcline">
      <span class="big">合計</span>
      <span class="out f-out">—</span>
      <button class="minibtn f-toggle">⚖️ 用量計算</button>
    </div>

    <div class="dosehelp ${r.doseOpen?'open':''}">
      <div class="g">
        <div><label class="lab">体重 kg</label><input class="f-w" inputmode="decimal" value="${esc(r.w)}" placeholder="5"></div>
        <div><label class="lab">用量 mg/kg（1回）</label><input class="f-mgkg" inputmode="decimal" value="${esc(r.mgkg)}" placeholder="PDF参照"></div>
        <div><label class="lab">規格 mg/錠</label><input class="f-mg" inputmode="decimal" value="" placeholder="自動 or 入力"></div>
        <div><button class="smallbtn f-apply">1回量へ</button></div>
      </div>
      <div class="res f-doseres">体重・mg/kg・規格を入れると 1回に必要な錠数を計算します。</div>
    </div>
  `;

  // --- ハンドラ ---
  const q = s=>el.querySelector(s);
  const nameEl=q('.f-name'), doseEl=q('.f-dose'), daysEl=q('.f-days');

  nameEl.addEventListener('input', ()=>{ r.name=nameEl.value; autofillMg(r,el); persist(); renderPreview(); });
  doseEl.addEventListener('input', ()=>{ r.dose=doseEl.value; updateOut(r,el); persist(); renderPreview(); });
  daysEl.addEventListener('input', ()=>{ r.days=daysEl.value; updateOut(r,el); persist(); renderPreview(); });

  el.querySelector('.del').addEventListener('click', ()=>{ removeRow(r.id); });

  q('.f-dosechips').querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    r.dose=c.dataset.v; doseEl.value=c.dataset.v; updateOut(r,el); persist(); renderPreview();
  }));
  el.querySelectorAll('.f-daychip').forEach(c=>c.addEventListener('click',()=>{
    r.days=c.dataset.v; daysEl.value=c.dataset.v; updateOut(r,el); persist(); renderPreview();
  }));
  q('.f-freq').querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    r.freq=+c.dataset.n; r.freqKey=c.dataset.k;
    q('.f-freq').querySelectorAll('.chip').forEach(x=>x.classList.toggle('on', x===c));
    updateOut(r,el); persist(); renderPreview();
  }));

  // 用量計算ヘルパー
  const help=q('.dosehelp');
  q('.f-toggle').addEventListener('click',()=>{ r.doseOpen=!r.doseOpen; help.classList.toggle('open',r.doseOpen); });
  const wEl=q('.f-w'), mgkgEl=q('.f-mgkg'), mgEl=q('.f-mg');
  autofillMg(r,el);
  const recompute=()=>{ r.w=wEl.value; r.mgkg=mgkgEl.value; doseHelp(el,wEl.value,mgkgEl.value,mgEl.value); persist(); };
  wEl.addEventListener('input',recompute); mgkgEl.addEventListener('input',recompute); mgEl.addEventListener('input',recompute);
  q('.f-apply').addEventListener('click',()=>{
    const t=doseHelp(el,wEl.value,mgkgEl.value,mgEl.value,true);
    if(t!=null){ r.dose=t; doseEl.value=t; updateOut(r,el); persist(); renderPreview(); toast('1回量に反映しました'); }
  });

  updateOut(r,el);
  doseHelp(el,r.w,r.mgkg,'');
  return el;
}

/** プリセットに規格mgがあれば用量計算の規格欄へ自動補完 */
function autofillMg(r,el){
  const mgEl=el.querySelector('.f-mg'); if(!mgEl || mgEl.value) return;
  const p = presets.find(p=>p.name && p.name===r.name.trim());
  if(p && p.mg) mgEl.value=p.mg;
}

function updateOut(r,el){
  const c=calcRow(r);
  const out=el.querySelector('.f-out');
  if(!c){ out.innerHTML='<span style="color:var(--muted)">1回量・頻度・日数を入力</span>'; return; }
  const frac = c.total.d!==1 ? `（${c.total.mixed()}）` : '';
  out.innerHTML = `<b style="color:#fff">${fmtNum(c.total.toNumber())}T</b> ${frac} ／ ${c.days}日分　`
    + `<span style="color:var(--muted)">= ${doseLabel(c.dose)} × ${r.freq} × ${c.days}</span>`;
}

/** 用量ヘルパー：体重×mg/kg = 1回必要mg、÷規格 = 1回錠数。apply=true なら文字列を返す */
function doseHelp(el, w, mgkg, mg, apply){
  const res=el.querySelector('.f-doseres');
  const W=parseFloat(w), MK=parseFloat(mgkg), MG=parseFloat(mg||el.querySelector('.f-mg').value);
  if(!W||!MK){ if(!apply) res.textContent='体重・mg/kg・規格を入れると 1回に必要な錠数を計算します。'; return null; }
  const needMg = W*MK;
  let txt = `1回 必要量 = ${fmtNum(needMg)} mg`;
  let applyVal=null;
  if(MG){
    const tabs = needMg/MG;
    const q = Math.round(tabs*4)/4;              // 1/4錠きざみに丸めた目安
    txt += ` ／ ${fmtNum(tabs)}錠（規格${fmtNum(MG)}mg）　→ 目安 ${fmtNum(q)}錠`;
    applyVal = fmtNum(q);
  } else {
    txt += ` ／ 規格mgを入れると錠数を計算`;
  }
  if(!apply) res.textContent=txt;
  return applyVal;
}

// ─────────────────────────────────────────────────────────────
// プレビュー・コピー・Slack
// ─────────────────────────────────────────────────────────────
function drugLines(){
  return rows.map(lineFor).filter(Boolean);
}
function renderPreview(){
  const lines=drugLines();
  $('preview').textContent = lines.length ? lines.join('\n') : '—';
  refreshDatalist();
}
function refreshDatalist(){
  let dl=$('preset-dl');
  if(!dl){ dl=document.createElement('datalist'); dl.id='preset-dl'; document.body.appendChild(dl); }
  dl.innerHTML = presets.map(p=>`<option value="${esc(p.name)}">`).join('');
}

function copyOut(){
  const lines=drugLines();
  if(!lines.length){ toast('計算できる薬剤がありません'); return; }
  saveHistory();
  copyText(lines.join('\n'));
}
function copyText(t){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(t).then(()=>toast('コピーしました'), ()=>fallbackCopy(t));
  } else fallbackCopy(t);
}
function fallbackCopy(t){
  // iOS Safari でも確実に選択→コピーできるよう range 選択方式にする
  const ta=document.createElement('textarea');
  ta.value=t; ta.readOnly=false; ta.contentEditable='true';
  ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0';
  ta.style.width='1px'; ta.style.height='1px'; ta.style.opacity='0';
  document.body.appendChild(ta);
  const range=document.createRange(); range.selectNodeContents(ta);
  const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  ta.setSelectionRange(0, t.length);
  let done=false; try{ done=document.execCommand('copy'); }catch(_){}
  sel.removeAllRanges(); ta.remove();
  toast(done ? 'コピーしました' : 'コピーできません→下の枠を長押しでコピー');
}

function buildSlackText(){
  const lines=drugLines();
  const k=val('karte'), n=val('pname'), d=val('pdate');
  const head = `🐾 処方 ${k?('No.'+k):''}${n?(' '+n):''}  ${d||''}`.replace(/\s+/g,' ').trim();
  return head + '\n' + lines.map(l=>'・'+l).join('\n');
}
function sendSlack(){
  const lines=drugLines();
  if(!lines.length){ toast('計算できる薬剤がありません'); return; }
  if(!settings.webhook){ toast('設定でSlack Webhookを登録してください'); openSettings(); return; }
  saveHistory();
  const text=buildSlackText();
  // ブラウザからのWebhook投稿はCORSのため no-cors（成否は受け取れない＝投げっぱなし）
  fetch(settings.webhook, { method:'POST', mode:'no-cors', body: JSON.stringify({ text }) })
    .then(()=> toast('Slackへ送信しました'))
    .catch(()=> toast('送信に失敗しました（Webhook URLを確認）'));
}

// ─────────────────────────────────────────────────────────────
// 行の追加・削除・クリア
// ─────────────────────────────────────────────────────────────
function syncFromDom(){ /* 値はイベントでrowsへ反映済み。将来用の空フック */ }
function addDrug(){ const r=blankRow(); rows.push(r); render(); persist();
  // 追加した薬剤名にフォーカス
  const last=$('drugs').lastElementChild?.querySelector('.f-name'); last&&last.focus();
}
function removeRow(id){
  rows=rows.filter(r=>r.id!==id);
  if(!rows.length) rows=[blankRow()];
  render(); persist();
}
function clearAll(){
  if(!confirm('この患者の入力をすべてクリアしますか？（薬剤プリセットと設定は残ります）')) return;
  setVal('karte',''); setVal('pname','');
  setVal('pdate', new Date().toISOString().slice(0,10));
  rows=[blankRow()]; render(); persist(); updateRecallBtn(); toast('クリアしました');
}

// ─────────────────────────────────────────────────────────────
// 設定・プリセット
// ─────────────────────────────────────────────────────────────
function openSettings(){ $('webhook').value=settings.webhook||''; renderPresets(); $('settings').classList.add('open'); }
function saveSettings(){
  settings.webhook = $('webhook').value.trim();
  // プリセットを読み取り
  presets = [...document.querySelectorAll('#presetList .preset')].map(row=>({
    name: row.querySelector('.pn').value.trim(),
    mg: row.querySelector('.ps').value.trim()
  })).filter(p=>p.name);
  persistSettings(); persistPresets();
  $('settings').classList.remove('open');
  refreshDatalist();
  toast('設定を保存しました');
}
function renderPresets(){
  const list=$('presetList'); list.innerHTML='';
  const data = presets.length?presets:[{name:'',mg:''}];
  data.forEach(p=> list.appendChild(presetRow(p)) );
}
function presetRow(p){
  const d=document.createElement('div'); d.className='preset';
  d.innerHTML=`<input class="pn" placeholder="薬剤名" value="${esc(p.name||'')}">
    <input class="ps" inputmode="decimal" placeholder="mg/錠" value="${esc(p.mg||'')}">
    <button class="pd" title="削除">✕</button>`;
  d.querySelector('.pd').addEventListener('click',()=>d.remove());
  return d;
}
function addPreset(){ $('presetList').appendChild(presetRow({name:'',mg:''})); }
$('settings').addEventListener('click',e=>{ if(e.target===$('settings')) $('settings').classList.remove('open'); });
$('recall').addEventListener('click',e=>{ if(e.target===$('recall')) closeRecall(); });

// ─────────────────────────────────────────────────────────────
// トースト
// ─────────────────────────────────────────────────────────────
let _tt;
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2200); }

// ─────────────────────────────────────────────────────────────
// 起動
// ─────────────────────────────────────────────────────────────
loadAll();
render();
refreshDatalist();
updateRecallBtn();
</script>
